<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">

<style>
:root {
  --bg: #f2f2f7; --card: #ffffff; --card2: #e9e9ee; --text: #1c1c1e; --text2: #6e6e73;
  --green: #16a34a; --green-bg: #e5f6ec; --orange: #e8890c; --orange-bg: #fdf0dd;
  --red: #dc2626; --red-bg: #fdeaea; --border: rgba(0,0,0,.08); --tabbar: rgba(255,255,255,.92);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #000; --card: #1c1c1e; --card2: #2c2c2e; --text: #f2f2f7; --text2: #98989f;
    --green: #30c060; --green-bg: rgba(48,192,96,.16); --orange: #f0a132; --orange-bg: rgba(240,161,50,.16);
    --red: #f36; --red-bg: rgba(255,51,102,.14); --border: rgba(255,255,255,.1); --tabbar: rgba(20,20,22,.92);
  }
}
* { box-sizing: border-box; margin: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  font-family: -apple-system, "SF Pro Text", "Helvetica Neue", system-ui, sans-serif;
  background: var(--bg); color: var(--text);
  padding-bottom: calc(72px + env(safe-area-inset-bottom));
  -webkit-font-smoothing: antialiased; overscroll-behavior-y: contain;
}
header {
  position: sticky; top: 0; z-index: 10; background: var(--bg);
  padding: calc(10px + env(safe-area-inset-top)) 16px 8px;
  display: flex; align-items: center; justify-content: space-between;
}
header h1 { font-size: 28px; font-weight: 800; letter-spacing: -.5px; }
#refreshBtn {
  border: 0; background: var(--card); color: var(--green); font-size: 15px; font-weight: 600;
  padding: 8px 14px; border-radius: 999px; box-shadow: 0 1px 3px var(--border);
}
#refreshBtn.spin { opacity: .6; }
main { padding: 4px 16px 24px; max-width: 560px; margin: 0 auto; }
.view { display: none; }
.view.active { display: block; }
.card {
  background: var(--card); border-radius: 16px; padding: 14px; margin-bottom: 12px;
  box-shadow: 0 1px 2px var(--border);
}
.muted { color: var(--text2); font-size: 13px; }
.section-title { font-size: 17px; font-weight: 700; margin: 18px 0 10px; display: flex; align-items: center; gap: 6px; }
.stats { display: flex; gap: 10px; margin: 12px 0; }
.stat { flex: 1; background: var(--card); border-radius: 14px; padding: 12px 6px; text-align: center; box-shadow: 0 1px 2px var(--border); }
.stat b { display: block; font-size: 22px; }
.stat span { font-size: 11px; color: var(--text2); }
.banner { display: flex; gap: 10px; align-items: flex-start; }
.banner.orange { background: var(--orange-bg); }
.banner.orange b { color: var(--orange); }
.banner .emoji { font-size: 22px; }
.offer { display: flex; gap: 12px; align-items: flex-start; }
.offer .ico { font-size: 22px; width: 40px; height: 40px; border-radius: 10px; background: var(--green-bg); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.offer .body { flex: 1; min-width: 0; }
.offer .name { font-weight: 600; font-size: 15px; }
.priceline { display: flex; align-items: baseline; gap: 7px; flex-wrap: wrap; margin: 2px 0; }
.price { color: var(--green); font-weight: 800; font-size: 17px; }
.oldprice { color: var(--text2); text-decoration: line-through; font-size: 13px; }
.disc { background: var(--red-bg); color: var(--red); font-size: 11px; font-weight: 800; padding: 2px 6px; border-radius: 999px; }
.where { font-size: 13px; color: var(--text2); }
.expiry { font-size: 12px; color: var(--text2); }
.expiry.soon { color: var(--orange); font-weight: 600; }
.chips { display: flex; flex-wrap: wrap; gap: 8px; }
.chip {
  background: var(--card); border: 0; border-radius: 999px; padding: 9px 14px; font-size: 14px;
  color: var(--text); box-shadow: 0 1px 2px var(--border); font-weight: 500;
}
.chip .n { color: var(--green); font-size: 12px; font-weight: 700; }
.market { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); }
.market:last-child { border-bottom: 0; }
.market .dist { margin-left: auto; color: var(--text2); font-size: 13px; font-weight: 600; white-space: nowrap; }
.searchbox { display: flex; gap: 8px; margin-bottom: 14px; }
.searchbox input {
  flex: 1; border: 0; background: var(--card); border-radius: 14px; padding: 14px; font-size: 16px;
  color: var(--text); box-shadow: 0 1px 2px var(--border); outline: none;
}
.btn {
  border: 0; background: var(--green); color: #fff; font-weight: 700; font-size: 15px;
  border-radius: 14px; padding: 13px 16px;
}
.btn.full { width: 100%; margin-top: 4px; }
.btn.small { padding: 8px 12px; font-size: 13px; border-radius: 10px; }
.btn.gray { background: var(--card2); color: var(--text); }
.prod { display: flex; align-items: center; gap: 10px; padding: 11px 0; border-bottom: 1px solid var(--border); }
.prod:last-child { border-bottom: 0; }
.prod .del { margin-left: auto; border: 0; background: var(--red-bg); color: var(--red); border-radius: 10px; padding: 6px 10px; font-size: 13px; font-weight: 600; }
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 6px; font-weight: 600; }
.field input, .field select {
  width: 100%; border: 0; background: var(--card); border-radius: 12px; padding: 13px; font-size: 16px;
  color: var(--text); box-shadow: 0 1px 2px var(--border); outline: none; -webkit-appearance: none;
}
.seg { display: flex; background: var(--card2); border-radius: 12px; padding: 3px; }
.seg button { flex: 1; border: 0; background: transparent; padding: 9px 0; border-radius: 10px; font-size: 14px; font-weight: 600; color: var(--text2); }
.seg button.on { background: var(--card); color: var(--text); box-shadow: 0 1px 3px var(--border); }
.pill { font-size: 12px; font-weight: 700; padding: 3px 9px; border-radius: 999px; }
.pill.ok { background: var(--green-bg); color: var(--green); }
.pill.warn { background: var(--orange-bg); color: var(--orange); }
.row { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.row:last-child { border-bottom: 0; }
#tabbar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
  background: var(--tabbar); -webkit-backdrop-filter: blur(18px); backdrop-filter: blur(18px);
  display: flex; border-top: 1px solid var(--border);
  padding-bottom: env(safe-area-inset-bottom);
}
#tabbar button { flex: 1; border: 0; background: transparent; padding: 9px 0 7px; color: var(--text2); font-size: 10px; font-weight: 600; }
#tabbar button .i { display: block; font-size: 22px; margin-bottom: 2px; filter: grayscale(1) opacity(.55); }
#tabbar button.on { color: var(--green); }
#tabbar button.on .i { filter: none; }
#toast {
  position: fixed; left: 16px; right: 16px; bottom: calc(84px + env(safe-area-inset-bottom)); z-index: 30;
  background: var(--text); color: var(--bg); border-radius: 14px; padding: 13px 16px; font-size: 14px; font-weight: 500;
  opacity: 0; transform: translateY(8px); transition: .25s; pointer-events: none; text-align: center;
}
#toast.show { opacity: 1; transform: none; }
#detail {
  position: fixed; inset: 0; z-index: 40; background: var(--bg); overflow-y: auto;
  padding: calc(14px + env(safe-area-inset-top)) 16px 40px; display: none;
}
#detail.open { display: block; }
#detail .back { border: 0; background: var(--card); color: var(--green); font-weight: 700; border-radius: 999px; padding: 8px 16px; font-size: 15px; margin-bottom: 14px; }
.filters { margin-bottom: 12px; }
.filters summary { font-weight: 700; font-size: 15px; padding: 4px 0; list-style: none; }
.filters summary::-webkit-details-marker { display: none; }
.checkline { display: flex; align-items: center; gap: 8px; padding: 7px 0; font-size: 15px; }
.checkline input { width: 20px; height: 20px; accent-color: var(--green); }
input[type=range] { width: 100%; accent-color: var(--green); }
.empty { text-align: center; padding: 28px 14px; }
.empty .e { font-size: 40px; display: block; margin-bottom: 8px; }
svg.chart { width: 100%; height: 190px; }
.legend { display: flex; flex-wrap: wrap; gap: 10px; font-size: 12px; color: var(--text2); margin-top: 6px; }
.legend i { display: inline-block; width: 10px; height: 10px; border-radius: 3px; margin-right: 4px; }
</style>

<body>

<header>
  <h1 id="headTitle">Convenienza</h1>
  <button id="refreshBtn" onclick="App.refreshAll(true)">↻ Aggiorna</button>
</header>

<main>
  <div id="view-home" class="view active"></div>
  <div id="view-cerca" class="view"></div>
  <div id="view-offerte" class="view"></div>
  <div id="view-profilo" class="view"></div>
</main>

<div id="detail"></div>
<div id="toast"></div>

<nav id="tabbar">
  <button data-tab="home" class="on"><span class="i">🏠</span>Home</button>
  <button data-tab="cerca"><span class="i">🔍</span>Cerca</button>
  <button data-tab="offerte"><span class="i">🏷️</span>Offerte</button>
  <button data-tab="profilo"><span class="i">👤</span>Profilo</button>
</nav>

<script>
"use strict";

/* ============================== Utilità ============================== */
const $ = (s) => document.querySelector(s);
const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
// Per stringhe dentro onclick="fn('...')": prima escape JS, poi escape HTML.
const q = (s) => esc(String(s ?? "").replace(/\\/g, "\\\\").replace(/'/g, "\\'"));
const normalize = (s) => s.normalize("NFD").replace(/\p{Diacritic}/gu, "").trim().toLowerCase();
const eur = (v) => "€ " + Number(v).toFixed(2).replace(".", ",");
const fmtDist = (m) => m < 1000 ? Math.round(m) + " m" : (m / 1000).toFixed(1).replace(".", ",") + " km";
const haversine = (a, b) => {
  const R = 6371000, r = Math.PI / 180;
  const dLat = (b.lat - a.lat) * r, dLon = (b.lon - a.lon) * r;
  const h = Math.sin(dLat/2)**2 + Math.cos(a.lat*r) * Math.cos(b.lat*r) * Math.sin(dLon/2)**2;
  return 2 * R * Math.asin(Math.sqrt(h));
};
function isoWeek(d = new Date()) {
  const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const day = date.getUTCDay() || 7;
  date.setUTCDate(date.getUTCDate() + 4 - day);
  const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
  return { year: date.getUTCFullYear(), week: Math.ceil((((date - yearStart) / 86400000) + 1) / 7) };
}
function weekBounds() {
  const now = new Date(), day = (now.getDay() + 6) % 7;
  const start = new Date(now); start.setDate(now.getDate() - day); start.setHours(0,0,0,0);
  const end = new Date(start); end.setDate(start.getDate() + 7);
  return { start, end };
}
const fnv1a = (str) => { let h = 2166136261; for (let i = 0; i < str.length; i++) { h ^= str.charCodeAt(i); h = Math.imul(h, 16777619); } return (h >>> 0).toString(16); };
function fmtExpiry(iso) {
  const d = new Date(iso), now = new Date();
  if (d < now) return "Scaduta";
  const days = Math.ceil((d - now) / 86400000);
  if (days <= 1) return "Scade oggi";
  if (days === 2) return "Scade domani";
  if (days <= 7) return `Scade tra ${days} giorni`;
  return "Fino al " + d.toLocaleDateString("it-IT", { day: "numeric", month: "short" });
}
const isSoon = (iso) => { const d = new Date(iso); return d > new Date() && d - new Date() < 48 * 3600e3; };

/* ======================= Catene e categorie ======================= */
const CHAINS = [
  ["Esselunga", ["esselunga"]], ["Eurospin", ["eurospin"]], ["Carrefour", ["carrefour"]],
  ["Conad", ["conad", "todis"]], ["Coop", ["coop"]], ["Lidl", ["lidl"]],
  ["Penny Market", ["penny"]], ["Pam", ["pam", "panorama"]], ["Famila", ["famila"]],
  ["Despar", ["despar", "eurospar", "interspar"]], ["Crai", ["crai"]], ["Sigma", ["sigma"]],
  ["Tigre", ["tigre", "oasi"]], ["MD", ["md"]], ["Aldi", ["aldi"]], ["In's Mercato", ["in's", "ins mercato"]],
  ["Bennet", ["bennet"]], ["Iper", ["iper"]], ["Tigros", ["tigros"]], ["Basko", ["basko"]],
];
function detectChain(name) {
  const n = " " + normalize(name || "") + " ";
  for (const [chain, keys] of CHAINS) {
    if (keys.some((k) => n.includes(" " + k) || n.includes(k + " ") || n.trim() === k)) return chain;
  }
  return null;
}
const CATS = [
  ["Frutta e Verdura", "🥕", ["mela","banana","pomodor","insalata","zucchin","carot","patat","frutta","verdura","aranc","limon","pera","uva","kiwi","melanzan","pepero"]],
  ["Latticini e Uova", "🥛", ["latte","yogurt","formaggio","mozzarella","burro","uova","uovo","parmigiano","grana","ricotta","panna"]],
  ["Carne e Pesce", "🐟", ["pollo","manzo","maiale","prosciutto","salame","tonno","salmone","pesce","carne","wurstel","bresaola","tacchino","gamber"]],
  ["Dispensa", "🥫", ["pasta","riso","olio","sale","farina","zucchero","passata","pelati","legumi","fagioli","ceci","lenticchie","aceto","sugo"]],
  ["Surgelati", "❄️", ["surgelat","gelato","bastoncini","minestrone"]],
  ["Bevande", "🥤", ["acqua","vino","birra","succo","cola","aranciata","spremuta","bibita"]],
  ["Colazione e Dolci", "🍪", ["biscott","caffe","cereali","merendin","cioccolat","nutella","marmellata","miele","fette","croissant","brioche","torta"]],
  ["Cura Persona", "🧴", ["shampoo","sapone","dentifricio","bagnoschiuma","deodorante","rasoi","assorbent","spazzolino"]],
  ["Cura Casa", "🧽", ["detersivo","ammorbidente","candeggina","carta igienica","scottex","sgrassatore","sacchetti","spugn","piatti"]],
];
function guessCat(name) {
  const n = normalize(name);
  for (const [cat, icon, keys] of CATS) if (keys.some((k) => n.includes(k))) return { cat, icon };
  return { cat: "Altro", icon: "🛒" };
}
const catIcon = (cat) => (CATS.find((c) => c[0] === cat) || [,"🛒"])[1];

/* ============================== Stato ============================== */
const store = {
  get(k, fb) { try { const v = localStorage.getItem("cv." + k); return v === null ? fb : JSON.parse(v); } catch { return fb; } },
  set(k, v) { try { localStorage.setItem("cv." + k, JSON.stringify(v)); } catch {} },
};
const S = {
  products: store.get("products", []),      // {name, norm, cat, icon, addedAt}
  offers: store.get("offers", []),          // {key, norm, label, chain, market, lat, lon, price, prev, startsAt, endsAt, notified}
  history: store.get("history", []),        // {norm, chain, price, promo, at}
  markets: store.get("markets", []),        // {id, name, chain, lat, lon, dist}
  radius: store.get("radius", 10),
  groqKey: store.get("groqKey", ""),
  pos: store.get("pos", null),              // {lat, lon}
  city: store.get("city", null),
  lastCheck: store.get("lastCheck", null),
  filter: { maxKm: null, chains: [], cats: [], minDisc: 0, maxPrice: null, sort: "sconto" },
  tab: "home", checking: false, locDenied: false,
};
const persist = () => { for (const k of ["products","offers","history","markets","radius","groqKey","pos","city","lastCheck"]) store.set(k, S[k]); };
const activeOffers = () => S.offers.filter((o) => new Date(o.endsAt) > new Date());

/* ============================ Posizione ============================ */
function locate() {
  return new Promise((resolve) => {
    if (!navigator.geolocation) return resolve(null);
    navigator.geolocation.getCurrentPosition(
      (p) => { S.pos = { lat: p.coords.latitude, lon: p.coords.longitude }; S.locDenied = false; persist(); resolve(S.pos); },
      () => { S.locDenied = true; resolve(S.pos); },
      { enableHighAccuracy: false, timeout: 12000, maximumAge: 300000 }
    );
  });
}
async function reverseCity() {
  if (!S.pos) return;
  try {
    const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${S.pos.lat}&lon=${S.pos.lon}&zoom=10&accept-language=it`);
    const j = await r.json();
    S.city = j.address?.city || j.address?.town || j.address?.village || j.address?.county || null;
    persist();
  } catch {}
}

/* ========================== Supermercati ========================== */
const OVERPASS = ["https://overpass-api.de/api/interpreter", "https://overpass.kumi.systems/api/interpreter", "https://overpass.private.coffee/api/interpreter"];
async function findMarkets() {
  if (!S.pos) return;
  const q = `[out:json][timeout:25];nwr["shop"~"^(supermarket|discount)$"](around:${S.radius * 1000},${S.pos.lat},${S.pos.lon});out center tags 60;`;
  for (const ep of OVERPASS) {
    try {
      const r = await fetch(ep, { method: "POST", body: "data=" + encodeURIComponent(q), headers: { "Content-Type": "application/x-www-form-urlencoded" } });
      if (!r.ok) continue;
      const j = await r.json();
      const seen = new Set();
      S.markets = (j.elements || [])
        .map((e) => {
          const lat = e.lat ?? e.center?.lat, lon = e.lon ?? e.center?.lon;
          const name = e.tags?.name || e.tags?.brand;
          if (!lat || !lon || !name) return null;
          const key = name + "|" + lat.toFixed(4) + "|" + lon.toFixed(4);
          if (seen.has(key)) return null; seen.add(key);
          return { id: key, name, chain: detectChain(e.tags?.brand || name), lat, lon, dist: haversine(S.pos, { lat, lon }) };
        })
        .filter(Boolean)
        .sort((a, b) => a.dist - b.dist);
      persist();
      return;
    } catch {}
  }
}

/* ===================== Offerte reali via Groq ===================== */
async function groqBatch(products, chains) {
  const { year, week } = isoWeek();
  const cacheKey = `cv.groq.${year}W${week}.` + fnv1a([...products.map(normalize)].sort().join("|") + "::" + [...chains].sort().join("|"));
  try {
    const c = JSON.parse(localStorage.getItem(cacheKey) || "null");
    if (c && Date.now() - c.at < 6 * 3600e3) return c.content;
  } catch {}

  const today = new Date().toLocaleDateString("it-IT", { day: "numeric", month: "long", year: "numeric" });
  const body = {
    model: "groq/compound",
    temperature: 0.2, max_tokens: 3000,
    messages: [
      { role: "system", content: `Sei un motore di ricerca di offerte dei supermercati fisici italiani. Cerca sul web (siti ufficiali delle catene e aggregatori di volantini come volantinofacile, promoqui, doveconviene) le promozioni ATTIVE dei volantini di questa settimana. Solo supermercati fisici: mai e-commerce o negozi online. Alla fine rispondi SOLO con JSON valido, senza testo aggiuntivo: {"offers":[{"product":"query originale","label":"nome nel volantino","chain":"Lidl","price":1.99,"previous_price":2.99,"starts_at":"2026-07-06","ends_at":"2026-07-19"}]}. "product" identico a una delle query richieste; "chain" una delle catene richieste; previous_price/starts_at/ends_at possono essere null. Includi SOLO offerte trovate davvero online, mai inventate.` },
      { role: "user", content: `Oggi è ${today}. Trova le offerte attive questa settimana nei volantini in Italia${S.city ? ", zona " + S.city : ""} per: ${products.join(", ")}. Catene: ${chains.join(", ")}.` },
    ],
  };
  const call = async () => fetch("https://api.groq.com/openai/v1/chat/completions", {
    method: "POST",
    headers: { "Authorization": "Bearer " + S.groqKey, "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });
  let r = await call();
  let j = await r.json().catch(() => ({}));
  if (r.status === 429 || j?.error?.code === "rate_limit_exceeded") {
    const m = /in (\d+(?:\.\d+)?)s/.exec(j?.error?.message || "");
    const wait = Math.min(m ? +m[1] + 1 : 20, 60);
    await new Promise((res) => setTimeout(res, wait * 1000));
    r = await call(); j = await r.json().catch(() => ({}));
  }
  const content = j?.choices?.[0]?.message?.content;
  if (!content) throw new Error(j?.error?.message || "Risposta non valida");
  try { localStorage.setItem(cacheKey, JSON.stringify({ at: Date.now(), content })); } catch {}
  return content;
}

function parseOffers(content, requested) {
  const a = content.indexOf("{"), b = content.lastIndexOf("}");
  if (a < 0 || b <= a) return [];
  let root; try { root = JSON.parse(content.slice(a, b + 1)); } catch { return []; }
  const { start, end } = weekBounds();
  const reqMap = new Map(requested.map((p) => [normalize(p), p]));
  return (root.offers || []).map((raw) => {
    const price = parseFloat(String(raw.price).replace(",", "."));
    if (!raw.product || !raw.label || !raw.chain || !(price > 0) || price > 500) return null;
    const norm = normalize(String(raw.product));
    let q = reqMap.get(norm);
    if (!q) for (const [k, v] of reqMap) if (norm.includes(k) || k.includes(norm)) { q = v; break; }
    if (!q) return null;
    const chain = detectChain(String(raw.chain));
    if (!chain) return null;
    let prev = parseFloat(String(raw.previous_price ?? "").replace(",", "."));
    if (!(prev > price)) prev = null;
    const startsAt = raw.starts_at ? new Date(raw.starts_at) : start;
    let endsAt = raw.ends_at ? new Date(raw.ends_at) : end;
    if (isNaN(endsAt) || endsAt <= new Date()) return null;
    const max = new Date(Date.now() + 60 * 86400e3);
    if (endsAt > max) endsAt = max;
    return { q, label: String(raw.label), chain, price: Math.round(price * 100) / 100, prev: prev ? Math.round(prev * 100) / 100 : null, startsAt, endsAt };
  }).filter(Boolean);
}

async function checkOffers() {
  if (!S.groqKey || !S.products.length || !S.markets.length) return 0;
  const chains = [...new Set(S.markets.map((m) => m.chain).filter(Boolean))];
  if (!chains.length) return 0;
  const { year, week } = isoWeek();
  let fresh = 0;
  const names = S.products.map((p) => p.name);
  for (let i = 0; i < names.length; i += 3) {
    const batch = names.slice(i, i + 3);
    let content;
    try { content = await groqBatch(batch, chains); }
    catch { break; }
    for (const o of parseOffers(content, batch)) {
      const norm = normalize(o.q);
      const key = `${norm}|${o.chain}|${year}-W${week}`;
      const branch = S.markets.filter((m) => m.chain === o.chain).sort((x, y) => x.dist - y.dist)[0];
      if (!branch) continue;
      const existing = S.offers.find((x) => x.key === key);
      if (existing) {
        Object.assign(existing, { market: branch.name, lat: branch.lat, lon: branch.lon });
      } else {
        S.offers.push({ key, norm, label: o.label, chain: o.chain, market: branch.name, lat: branch.lat, lon: branch.lon,
          price: o.price, prev: o.prev, startsAt: o.startsAt.toISOString(), endsAt: o.endsAt.toISOString(), notified: false });
        if (o.prev) S.history.push({ norm, chain: o.chain, price: o.prev, promo: false, at: o.startsAt.toISOString() });
        S.history.push({ norm, chain: o.chain, price: o.price, promo: true, at: new Date().toISOString() });
        fresh++;
      }
    }
  }
  // pulizia offerte scadute da oltre 30 giorni
  const cutoff = Date.now() - 30 * 86400e3;
  S.offers = S.offers.filter((o) => new Date(o.endsAt).getTime() > cutoff);
  persist();
  return fresh;
}

async function notifyNew() {
  const pend = S.offers.filter((o) => !o.notified && new Date(o.endsAt) > new Date());
  if (!pend.length) return;
  let canNotify = false;
  try {
    if ("Notification" in window && Notification.permission === "granted" && navigator.serviceWorker) {
      const reg = await navigator.serviceWorker.ready;
      canNotify = !!reg.showNotification;
      for (const o of pend) {
        const dist = S.pos ? fmtDist(haversine(S.pos, { lat: o.lat, lon: o.lon })) : null;
        const lines = [ eur(o.price) + (o.prev ? ` invece di ${eur(o.prev)}` : ""), `Da ${o.market}` + (dist ? ` · a ${dist}` : ""), fmtExpiry(o.endsAt) ];
        await reg.showNotification(`${o.label} è in offerta!`, { body: lines.join("\n"), icon: "icon-180.png", tag: o.key });
      }
    }
  } catch { canNotify = false; }
  if (!canNotify) toast(`🏷️ ${pend.length === 1 ? "Nuova offerta trovata" : pend.length + " nuove offerte trovate"}!`);
  pend.forEach((o) => (o.notified = true));
  try { navigator.setAppBadge?.(activeOffers().length); } catch {}
  persist();
}

/* ======================== Ciclo di aggiornamento ======================== */
const App = {
  async refreshAll(manual) {
    if (S.checking) return;
    S.checking = true;
    $("#refreshBtn").classList.add("spin");
    render();
    try {
      await locate();
      if (S.pos) {
        await Promise.all([reverseCity(), findMarkets()]);
        const fresh = await checkOffers();
        S.lastCheck = new Date().toISOString();
        persist();
        if (fresh > 0) await notifyNew();
        else if (manual) toast(S.groqKey ? "Nessuna nuova offerta al momento" : "Configura la chiave Groq nel Profilo");
      } else if (manual) {
        toast("Posizione non disponibile: consenti l'accesso in Safari");
      }
    } finally {
      S.checking = false;
      $("#refreshBtn").classList.remove("spin");
      render();
    }
  },
  addProduct(name) {
    name = (name || "").trim();
    if (!name) return;
    const norm = normalize(name);
    if (!S.products.some((p) => p.norm === norm)) {
      const { cat, icon } = guessCat(name);
      S.products.unshift({ name, norm, cat, icon, addedAt: new Date().toISOString() });
      persist();
    }
    toast(`"${name}" aggiunto: lo monitoriamo per te`);
    const input = $("#searchInput"); if (input) input.value = "";
    render();
    App.refreshAll(false);
    if ("Notification" in window && Notification.permission === "default") Notification.requestPermission().catch(() => {});
  },
  removeProduct(norm) {
    S.products = S.products.filter((p) => p.norm !== norm);
    S.offers = S.offers.filter((o) => o.norm !== norm);
    persist(); render();
  },
  setTab(tab) {
    S.tab = tab;
    document.querySelectorAll("#tabbar button").forEach((b) => b.classList.toggle("on", b.dataset.tab === tab));
    document.querySelectorAll(".view").forEach((v) => v.classList.toggle("active", v.id === "view-" + tab));
    $("#headTitle").textContent = { home: "Convenienza", cerca: "Cerca prodotti", offerte: "Offerte in zona", profilo: "Profilo" }[tab];
    window.scrollTo(0, 0);
    render();
  },
  setRadius(km) { S.radius = km; persist(); render(); App.refreshAll(false); },
  saveKey() {
    S.groqKey = $("#groqKey").value.trim(); persist();
    toast(S.groqKey ? "Chiave salvata sul dispositivo ✓" : "Chiave rimossa");
    render(); if (S.groqKey) App.refreshAll(false);
  },
  openDetail(norm) {
    const el = $("#detail");
    el.innerHTML = renderDetail(norm);
    el.classList.add("open");
    window.scrollTo(0, 0);
  },
  closeDetail() { $("#detail").classList.remove("open"); },
};

}

function priceChart(hist) {
  const W = 500, H = 190, pad = { l: 44, r: 10, t: 12, b: 22 };
  const ts = hist.map((h) => new Date(h.at).getTime());
  const ps = hist.map((h) => h.price);
  const t0 = Math.min(...ts), t1 = Math.max(...ts) || t0 + 1;
  const p0 = Math.min(...ps) * 0.9, p1 = Math.max(...ps) * 1.05 || 1;
  const X = (t) => pad.l + (t - t0) / (t1 - t0 || 1) * (W - pad.l - pad.r);
  const Y = (p) => H - pad.b - (p - p0) / (p1 - p0 || 1) * (H - pad.t - pad.b);
  const colors = ["#16a34a", "#2563eb", "#e8890c", "#dc2626", "#9333ea", "#0891b2"];
  const chains = [...new Set(hist.map((h) => h.chain))];
  let svg = "", legend = "";
  [0, .5, 1].forEach((f) => { const p = p0 + (p1 - p0) * f, y = Y(p);
    svg += `<line x1="${pad.l}" y1="${y}" x2="${W - pad.r}" y2="${y}" stroke="currentColor" opacity=".12"/><text x="4" y="${y + 4}" font-size="10" fill="currentColor" opacity=".55">${eur(p)}</text>`; });
  chains.forEach((c, i) => {
    const col = colors[i % colors.length];
    const pts = hist.filter((h) => h.chain === c);
    svg += `<polyline fill="none" stroke="${col}" stroke-width="2.5" stroke-linejoin="round" points="${pts.map((h) => X(new Date(h.at).getTime()) + "," + Y(h.price)).join(" ")}"/>`;
    pts.forEach((h) => { svg += `<circle cx="${X(new Date(h.at).getTime())}" cy="${Y(h.price)}" r="${h.promo ? 5 : 3}" fill="${col}"/>`; });
    legend += `<span><i style="background:${col}"></i>${esc(c)}</span>`;
  });
  return `<svg class="chart" viewBox="0 0 ${W} ${H}">${svg}</svg><div class="legend">${legend}</div><div class="muted" style="margin-top:4px;font-size:11px">I punti grandi sono prezzi in promozione.</div>`;
}

function render() {
  ({ home: renderHome, cerca: renderCerca, offerte: renderOfferte, profilo: renderProfilo })[S.tab]();
}

/* ============================== Avvio ============================== */
document.querySelectorAll("#tabbar button").forEach((b) => b.addEventListener("click", () => App.setTab(b.dataset.tab)));
if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(() => {});
render();
App.refreshAll(false);
setInterval(() => App.refreshAll(false), 30 * 60 * 1000); // controllo periodico mentre l'app è aperta
document.addEventListener("visibilitychange", () => {
  if (!document.hidden && S.lastCheck && Date.now() - new Date(S.lastCheck) > 30 * 60 * 1000) App.refreshAll(false);
});
</script>
</body>
</html>
